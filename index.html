<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NestNudge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>
</head>

<body>

  <header>
    <h1>NestNudge</h1>
    <p>Get matched with the best contractors, realtors, and lenders</p>

    <form id="leadForm">
      <input type="text" id="address" placeholder="Enter your address" required>

      <select id="projectType" required>
        <option value="">Select Project</option>
        <option value="roof">Roofing</option>
        <option value="solar">Solar</option>
        <option value="buy">Buy Home</option>
        <option value="sell">Sell Home</option>
        <option value="loan">Mortgage</option>
      </select>

      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="tel" id="phone" placeholder="Phone" required>

      <button type="submit">Get Matched</button>
    </form>
  </header>

  <!-- Tally Funnel -->
  <iframe src="https://tally.so/r/BzBzVe" width="100%" height="600" frameborder="0"></iframe>

  <script src="estimator.js"></script>

</body>
</html>
